name: daeddong
description: "대똥여지도 - 주변 화장실 찾기 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  google_maps_flutter: ^2.9.0   # ← 네이버 → 구글
  hive_flutter: ^1.1.0
  device_info_plus: ^11.3.3
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
